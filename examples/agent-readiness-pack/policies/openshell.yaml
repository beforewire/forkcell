# Draft OpenShell sandbox policy for BeforeWire agent-readiness packets.
# Based on OpenShell policy schema v1: filesystem_policy, landlock, process,
# and network_policies. This is shadow/read-only guidance; review before applying.
version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /etc
    - /var/log
    - /app
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  github_api_readonly:
    name: github-api-readonly-for-agent
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/curl }
  pypi_readonly:
    name: pypi-readonly-for-dependency-inspection
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/python }
      - { path: /usr/bin/python3 }
# No wildcard network policy is declared. Unknown egress should be denied by
# OpenShell's default-deny policy behavior.
